<!DOCTYPE html>
<html>
<head>
    <title>Churn Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1>📊 Customer Churn Prediction</h1>
        <p class="text-muted">Predict if a customer will leave the service</p>
    </div>

    <form method="POST" class="card bg-secondary p-4 shadow">
        {% csrf_token %}

        <div class="row">

            <div class="col-md-4 mb-3">
                <label class="form-label">Tenure (months)</label>
                <input type="number" class="form-control" name="tenure" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Monthly Charges</label>
                <input type="number" step="0.01" class="form-control" name="MonthlyCharges" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Total Charges</label>
                <input type="number" step="0.01" class="form-control" name="TotalCharges" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Contract</label>
                <select class="form-select" name="Contract">
                    <option>Month-to-month</option>
                    <option>One year</option>
                    <option>Two year</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Internet Service</label>
                <select class="form-select" name="InternetService">
                    <option>DSL</option>
                    <option>Fiber optic</option>
                    <option>No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Payment Method</label>
                <select class="form-select" name="PaymentMethod">
                    <option>Electronic check</option>
                    <option>Mailed check</option>
                    <option>Bank transfer (automatic)</option>
                    <option>Credit card (automatic)</option>
                </select>
            </div>

        </div>

        <button type="submit" class="btn btn-dark w-100 mt-3">
            🔍 Predict
        </button>
    </form>

    {% if result %}
        <div class="alert alert-info text-center mt-4 shadow">
            <h3>{{ result }}</h3>
            <p class="mb-0">Confidence: <strong>{{ prob }}%</strong></p>
        </div>
    {% endif %}

</div>

</body>
</html>
